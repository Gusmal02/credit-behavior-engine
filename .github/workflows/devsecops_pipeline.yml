name: DevSecOps Pipeline — Credit Behavior Engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-tests:
    name: SAST + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar uv
        run: pip install uv

      - name: Instalar dependencias
        run: uv pip install --system torch torchvision pandas numpy scikit-learn pymongo fastapi uvicorn mlflow python-dotenv pytest bandit

      - name: SAST — Bandit
        run: bandit -r . -c .bandit --format txt
        continue-on-error: true

      - name: Generar datos sintéticos de prueba
        run: python ci_data.py

      - name: Entrenar modelos CI
        run: python ci_train.py

      - name: Ejecutar pruebas unitarias
        run: pytest tests/ -v