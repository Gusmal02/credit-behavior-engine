name: DevSecOps Pipeline — Credit Behavior Engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-tests:
    name: SAST + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar uv
        run: pip install uv

      - name: Instalar dependencias
        run: uv pip install --system torch torchvision pandas numpy scikit-learn pymongo fastapi uvicorn mlflow python-dotenv pytest bandit

      - name: SAST — Bandit
        run: bandit -r . -c .bandit --format txt
        continue-on-error: true

      - name: Generar datos sintéticos de prueba
        run: |
          python -c "
          import pandas as pd, numpy as np, os
          os.makedirs('data', exist_ok=True)
          os.makedirs('models', exist_ok=True)
          np.random.seed(42)
          n=1000
          df = pd.DataFrame({
            'customer_unique_id': [f'c{i}' for i in range(n)],
            'total_ordenes': np.random.randint(1,5,n),
            'ticket_promedio_historico': np.random.exponential(200,n),
            'ticket_maximo': np.random.exponential(300,n),
            'cuotas_maximas_historico': np.random.randint(1,12,n).astype(float),
            'uso_credito_historico': np.random.randint(0,2,n).astype(float),
            'score_promedio_historico': np.random.uniform(1,5,n),
            'reviews_negativas': np.random.randint(0,3,n).astype(float),
            'dias_entrega_promedio': np.random.uniform(3,20,n),
            'retrasos_promedio': np.random.uniform(0,5,n),
            'categorias_exploradas': np.random.randint(1,5,n).astype(float),
            'antiguedad_dias': np.random.randint(30,500,n).astype(float),
            'dias_desde_ultima_compra': np.random.randint(1,200,n).astype(float),
            'region': np.random.choice(['Sudeste','Sul','Nordeste','Norte','Centro-Oeste'],n),
            'propenso_credito': np.random.randint(0,2,n),
          })
          df.to_csv('data/perfiles_clientes.csv', index=False)
          print('Dataset CI generado')
          "

      - name: Entrenar modelos CI
        run: |
          python - << 'EOF'
          import os, pickle, torch, torch.nn as nn
          import pandas as pd, numpy as np
          from sklearn.preprocessing import StandardScaler, LabelEncoder

          df = pd.read_csv('data/perfiles_clientes.csv')
          features = ['total_ordenes','ticket_promedio_historico','ticket_maximo',
                      'cuotas_maximas_historico','uso_credito_historico',
                      'score_promedio_historico','reviews_negativas',
                      'dias_entrega_promedio','retrasos_promedio',
                      'categorias_exploradas','antiguedad_dias',
                      'dias_desde_ultima_compra','ratio_flete_ticket',
                      'frecuencia_compra','score_comportamiento',
                      'es_recurrente','alto_valor']

          df['ratio_flete_ticket'] = 0.0
          df['frecuencia_compra'] = df['total_ordenes'] / (df['antiguedad_dias']/30).clip(lower=1)
          df['score_comportamiento'] = df['score_promedio_historico'] * 0.4
          df['es_recurrente'] = (df['total_ordenes'] > 1).astype(int)
          df['alto_valor'] = (df['ticket_maximo'] > df['ticket_promedio_historico']).astype(int)

          scaler = StandardScaler()
          scaler.fit(df[features].fillna(0))
          le = LabelEncoder()
          le.fit(['Centro-Oeste','Desconocido','Nordeste','Norte','Sudeste','Sul'])

          os.makedirs('models', exist_ok=True)
          with open('models/scaler.pkl','wb') as f: pickle.dump(scaler, f)
          with open('models/label_encoder.pkl','wb') as f: pickle.dump(le, f)
          with open('models/feature_names.pkl','wb') as f: pickle.dump(features, f)

          class Net(nn.Module):
              def __init__(self):
                  super().__init__()
                  self.embedding = nn.Embedding(6, 4)
                  self.red = nn.Sequential(nn.Linear(21, 64), nn.ReLU(), nn.Linear(64, 1))
              def forward(self, x, c):
                  e = self.embedding(c.squeeze(1))
                  return self.red(torch.cat([x, e], dim=1)).squeeze(1)

          model = Net()
          torch.save(model.state_dict(), 'models/credit_model_best.pth')
          print('Modelos CI listos')
          EOF

      - name: Ejecutar pruebas unitarias
        run: pytest tests/ -v